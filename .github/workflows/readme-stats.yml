name: Update README cards

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Generate stats card
        uses: Pranesh-2005/github-readme-stats-fast-action@v1.2
        with:
          card: stats
          options: username=gloomy5on&show_icons=true&theme=tokyonight
          path: profile/stats.svg
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}

      - name: Generate streak card
        uses: Pranesh-2005/github-readme-stats-fast-action@v1.2
        with:
          card: streak
          options: username=gloomy5on&show_icons=true&theme=tokyonight
          path: profile/streak.svg
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}

      - name: Generate Top Languages card
        uses: Pranesh-2005/github-readme-stats-fast-action@v1.2
        with:
          card: top-langs
          options: username=gloomy5on&layout=compact&theme=tokyonight
          path: profile/top-langs.svg
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add profile/*.svg
          git commit -m "Update README cards (Tokyo Night Theme)" || echo "No changes to commit"
          git push
