name: Update README cards

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Create profile folder
        run: mkdir -p profile

      - name: Generate stats card
        uses: Pranesh-2005/github-readme-stats-fast-action@v1.2
        with:
          card: stats
          options: username=gloomy5on&show_icons=true&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Generate streak card
        uses: Pranesh-2005/github-readme-stats-fast-action@v1.2
        with:
          card: streak
          options: username=gloomy5on&show_icons=true&theme=tokyonight
          path: profile/streak.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Generate Top Languages card
        uses: Pranesh-2005/github-readme-stats-fast-action@v1.2
        with:
          card: top-langs
          options: username=gloomy5on&layout=compact&theme=tokyonight
          path: profile/top-langs.svg
          token: ${{ secrets.METRICS_TOKEN }}

      - name: Commit and push cards
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add profile/*.svg
          git commit -m "Auto update README cards" || echo "No changes to commit"
          git push origin main
